name: Daily Exam Monitor

on:
  schedule:
    - cron: '30 0 * * *' # 6:00 AM IST daily
  workflow_dispatch: # Manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Sync date corrections and monitor exams
        uses: actions/github-script@v7
        env:
          API_URL: ${{ secrets.API_URL }}
          BOT_API_KEY: ${{ secrets.BOT_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const apiUrl = process.env.API_URL;
            const botKey = process.env.BOT_API_KEY;

            if (!apiUrl || !botKey) {
              core.setFailed('Missing API_URL or BOT_API_KEY secrets');
              return;
            }

            // --- Step 1: Read dateCorrections.js and sync confirmed dates to DB ---
            core.info('=== Step 1: Syncing date corrections to database ===');

            let corrections = [];
            try {
              const fileContent = fs.readFileSync('backend/seeds/dateCorrections.js', 'utf8');
              const match = fileContent.match(/const corrections = \[([\s\S]*?)\];/);
              if (match) {
                corrections = eval('[' + match[1] + ']');
                core.info(`Loaded ${corrections.length} date corrections from dateCorrections.js`);
              }
            } catch (err) {
              core.warning(`Could not load dateCorrections.js: ${err.message}`);
            }

            let syncedCount = 0;
            let syncErrors = 0;

            for (let i = 0; i < corrections.length; i += 10) {
              const batch = corrections.slice(i, i + 10).map(c => {
                const updates = {};
                if (c.lastDate) updates.lastDate = c.lastDate;
                if (c.vacancies) updates.vacancies = c.vacancies;
                if (c.dateStatus) updates.dateStatus = c.dateStatus;
                if (c.importantDates) updates.importantDates = c.importantDates;
                if (c.description) updates.description = c.description;
                return {
                  title: c.title,
                  updates,
                  source: 'date-corrections-sync'
                };
              });

              const updateRes = await fetch(`${apiUrl}/api/bot/bulk-update`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'x-bot-api-key': botKey
                },
                body: JSON.stringify({ exams: batch })
              });

              if (updateRes.ok) {
                const result = await updateRes.json();
                syncedCount += result.data?.updated || 0;
                const notFound = result.data?.results?.filter(r => r.status === 'not_found') || [];
                if (notFound.length > 0) {
                  core.info(`  Batch ${Math.floor(i/10)+1}: ${notFound.length} exam(s) not found in DB: ${notFound.map(r => r.title).join(', ')}`);
                }
              } else {
                syncErrors++;
                core.warning(`  Batch ${Math.floor(i/10)+1} sync failed: ${updateRes.status}`);
              }
            }

            core.info(`Date corrections sync: ${syncedCount} exams updated, ${syncErrors} batch errors`);

            // --- Step 2: Fetch all exams and check for expired ones ---
            core.info('\n=== Step 2: Monitoring for expired active exams ===');

            const fetchRes = await fetch(`${apiUrl}/api/bot/exams`, {
              headers: { 'x-bot-api-key': botKey }
            });

            if (!fetchRes.ok) {
              core.setFailed(`Failed to fetch exams: ${fetchRes.status}`);
              return;
            }

            const response = await fetchRes.json();
            const exams = response.data || response;

            const now = new Date();
            const active = exams.filter(e => e.isActive);
            const expired = active.filter(e => e.lastDate && new Date(e.lastDate) < now);
            const neverVerified = active.filter(e => !e.lastVerifiedAt);
            const stale = active.filter(e => {
              if (!e.lastVerifiedAt) return false;
              const diff = now - new Date(e.lastVerifiedAt);
              return diff > 14 * 24 * 60 * 60 * 1000;
            });

            core.info(`Total exams: ${exams.length}`);
            core.info(`Active: ${active.length}`);
            core.info(`Expired but still active: ${expired.length}`);
            core.info(`Never verified: ${neverVerified.length}`);
            core.info(`Stale (>14 days since verification): ${stale.length}`);

            if (expired.length === 0) {
              core.info('No expired active exams found. All good!');
              return;
            }

            // Auto-deactivate expired exams
            const deactivatePayload = expired.map(e => ({
              title: e.title,
              category: e.category,
              updates: { isActive: false, dateStatus: 'closed' },
              source: 'github-actions-monitor'
            }));

            for (let i = 0; i < deactivatePayload.length; i += 50) {
              const batch = deactivatePayload.slice(i, i + 50);
              const updateRes = await fetch(`${apiUrl}/api/bot/bulk-update`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'x-bot-api-key': botKey
                },
                body: JSON.stringify({ exams: batch })
              });

              if (!updateRes.ok) {
                core.warning(`Deactivation batch ${i / 50 + 1} failed: ${updateRes.status}`);
                continue;
              }

              const result = await updateRes.json();
              core.info(`Deactivation batch ${i / 50 + 1}: ${result.data?.updated || 0} exams deactivated`);
            }

            core.info(`Deactivation complete. ${expired.length} expired exams processed.`);
            for (const e of expired) {
              core.info(`  - ${e.title} (${e.category}) expired: ${e.lastDate}`);
            }
