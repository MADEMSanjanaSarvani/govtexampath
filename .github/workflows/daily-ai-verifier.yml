name: Daily AI Exam Verifier

on:
  schedule:
    - cron: '0 3 * * *' # 8:30 AM IST daily (1 hour after monitor)
  workflow_dispatch: # Manual trigger

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: AI-verify active exams
        uses: actions/github-script@v7
        env:
          API_URL: ${{ secrets.API_URL }}
          BOT_API_KEY: ${{ secrets.BOT_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const apiUrl = process.env.API_URL;
            const botKey = process.env.BOT_API_KEY;
            const geminiKey = process.env.GEMINI_API_KEY;

            if (!apiUrl || !botKey || !geminiKey) {
              core.setFailed('Missing required secrets (API_URL, BOT_API_KEY, GEMINI_API_KEY)');
              return;
            }

            const fetchRes = await fetch(`${apiUrl}/api/bot/exams?active=true`, {
              headers: { 'x-bot-api-key': botKey }
            });

            if (!fetchRes.ok) {
              core.setFailed(`Failed to fetch exams: ${fetchRes.status}`);
              return;
            }

            const response = await fetchRes.json();
            const exams = response.data || response;

            if (exams.length === 0) {
              core.info('No active exams to verify.');
              return;
            }

            // Pick 3 exams per run (Pro plan has generous limits)
            const now = new Date();
            const toVerify = exams
              .sort((a, b) => {
                const aDate = a.lastVerifiedAt ? new Date(a.lastVerifiedAt) : new Date(0);
                const bDate = b.lastVerifiedAt ? new Date(b.lastVerifiedAt) : new Date(0);
                return aDate - bDate;
              })
              .slice(0, 3);

            core.info(`Will verify ${toVerify.length} exams this run.`);

            async function callGemini(prompt, retries = 4) {
              for (let attempt = 1; attempt <= retries; attempt++) {
                const res = await fetch(
                  `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=${geminiKey}`,
                  {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      contents: [{ parts: [{ text: prompt }] }],
                      generationConfig: { temperature: 0.1, maxOutputTokens: 800 }
                    })
                  }
                );
                if (res.ok) return res;
                if (res.status === 429 && attempt < retries) {
                  const wait = attempt * 30000;
                  core.info(`  Rate limited (429). Waiting ${wait/1000}s before retry ${attempt+1}/${retries}...`);
                  await new Promise(r => setTimeout(r, wait));
                  continue;
                }
                return res;
              }
            }

            for (const exam of toVerify) {
              core.info(`\nVerifying: ${exam.title} (last verified: ${exam.lastVerifiedAt || 'never'})`);

              try {
                const prompt = `You are a government exam data verification assistant for Indian government exams. Verify the following exam data and provide ONLY a JSON response.

            Exam: ${exam.title}
            Category: ${exam.category}
            Current Last Date: ${exam.lastDate || 'not set'}
            Current Date Status: ${exam.dateStatus || 'not set'}
            Conducting Body: ${exam.conductingBody || 'not set'}
            Vacancies: ${exam.vacancies || 'not set'}

            Today's date: ${now.toISOString().split('T')[0]}

            Respond with ONLY this JSON format (no markdown, no code blocks, no explanation):
            {
              "needsUpdate": true/false,
              "updates": {
                "lastDate": "YYYY-MM-DD or null if unknown",
                "dateStatus": "upcoming/ongoing/closed",
                "vacancies": "number as string or null",
                "isActive": true/false,
                "description": "updated one-line description or null"
              },
              "confidence": "high/medium/low",
              "reason": "brief explanation"
            }

            Rules:
            - Only set needsUpdate to true if you are CONFIDENT the data has changed
            - If the last date has passed and no new cycle announced, set isActive to false and dateStatus to "closed"
            - Only include fields in updates that actually need changing
            - If unsure, set confidence to "low" and needsUpdate to false
            - For vacancies, use the exact number from official notification if available`;

                const geminiRes = await callGemini(prompt);

                if (!geminiRes.ok) {
                  core.warning(`Gemini API error for "${exam.title}": ${geminiRes.status}`);
                  continue;
                }

                const geminiData = await geminiRes.json();
                const text = geminiData.candidates?.[0]?.content?.parts?.[0]?.text || '';

                const jsonMatch = text.match(/\{[\s\S]*\}/);
                if (!jsonMatch) {
                  core.warning(`No valid JSON in Gemini response for "${exam.title}"`);
                  continue;
                }

                const verification = JSON.parse(jsonMatch[0]);
                core.info(`  AI result: needsUpdate=${verification.needsUpdate}, confidence=${verification.confidence}, reason=${verification.reason}`);

                if (!verification.needsUpdate || verification.confidence === 'low') {
                  await fetch(`${apiUrl}/api/bot/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-bot-api-key': botKey },
                    body: JSON.stringify({
                      title: exam.title,
                      category: exam.category,
                      updates: {},
                      source: 'gemini-ai-verifier'
                    })
                  });
                  core.info(`  Marked as verified (no changes needed)`);
                } else {
                  const updates = verification.updates || {};
                  // Remove null values
                  for (const key of Object.keys(updates)) {
                    if (updates[key] === null || updates[key] === undefined) delete updates[key];
                  }

                  const updateRes = await fetch(`${apiUrl}/api/bot/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-bot-api-key': botKey },
                    body: JSON.stringify({
                      title: exam.title,
                      category: exam.category,
                      updates,
                      source: 'gemini-ai-verifier'
                    })
                  });

                  if (updateRes.ok) {
                    const result = await updateRes.json();
                    core.info(`  Updated: ${JSON.stringify(result.data?.fieldsUpdated || [])}`);
                  } else {
                    core.warning(`  Update failed: ${updateRes.status}`);
                  }
                }

                // Brief pause between exams to respect rate limits
                await new Promise(r => setTimeout(r, 5000));

              } catch (err) {
                core.warning(`Error verifying "${exam.title}": ${err.message}`);
              }
            }

            core.info('\nAI verification complete.');
