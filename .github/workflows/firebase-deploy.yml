name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify environment variables
        run: |
          echo "GOOGLE_CLIENT_ID length: ${#GCID}"
          echo "GOOGLE_CLIENT_ID prefix: ${GCID:0:15}"
          if [ -z "$GCID" ]; then echo "::error::REACT_APP_GOOGLE_CLIENT_ID secret is empty!"; exit 1; fi
        env:
          GCID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://govtexampath-backend.onrender.com/api
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_GEMINI_API_KEY: ${{ secrets.REACT_APP_GEMINI_API_KEY }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        working-directory: frontend
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HOSTING }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          echo "$FIREBASE_SA_JSON" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          npx firebase-tools@latest deploy --only hosting \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive 2>&1 | tee /tmp/deploy-log.txt
          EXIT_CODE=${PIPESTATUS[0]}
          rm -f /tmp/firebase-sa.json
          if [ $EXIT_CODE -ne 0 ]; then
            if grep -q "is the current active version" /tmp/deploy-log.txt; then
              echo "Version already active — site is live with latest build."
              exit 0
            fi
            exit $EXIT_CODE
          fi
