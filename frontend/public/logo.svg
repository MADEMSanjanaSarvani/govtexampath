<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Shield body -->
  <path d="M200 10 L370 100 L370 280 Q370 400 200 490 Q30 400 30 280 L30 100 Z" fill="#1d4ed8"/>

  <!-- Graduation cap -->
  <polygon points="200,35 120,80 200,120 280,80" fill="#1d4ed8"/>
  <polygon points="200,20 100,75 200,125 300,75" fill="#2563eb"/>
  <!-- Cap top -->
  <rect x="185" y="0" width="30" height="25" rx="3" fill="#2563eb"/>
  <!-- Tassel -->
  <line x1="110" y1="78" x2="110" y2="130" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
  <circle cx="110" cy="135" r="7" fill="#2563eb"/>
  <line x1="107" y1="135" x2="95" y2="155" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>

  <!-- Road/Path - 3 white curves going upward -->
  <!-- Main center road -->
  <path d="M130 420 Q160 350 190 300 Q220 250 260 200 Q300 150 330 110"
        fill="none" stroke="white" stroke-width="28" stroke-linecap="round"/>

  <!-- Left road line -->
  <path d="M100 400 Q140 340 170 290 Q200 240 235 195 Q270 150 295 115"
        fill="none" stroke="#1d4ed8" stroke-width="10" stroke-linecap="round"/>

  <!-- Right road line -->
  <path d="M155 430 Q185 360 210 310 Q240 260 275 210 Q310 160 340 120"
        fill="none" stroke="#1d4ed8" stroke-width="8" stroke-linecap="round"/>

  <!-- Arrow head at top of path -->
  <polygon points="340,95 310,130 350,125" fill="white"/>
  <polygon points="345,90 315,80 340,120" fill="white"/>
</svg>
